 * customers_load.sas
 * Load raw customers into WORK, iteratively enrich, then finalize to STG.
 * Each in-place update of WORK.CUSTOMERS produces a new version of the table.
 *-----------------------------------------------------------------*/

libname raw   oracle user=&ora_user. password=&ora_pwd.
              path=crm_prod schema=CRM;
libname stg   "/data/staging";

%include "/sas/macros/clean_text.sas";

/* Step 1 — pull from Oracle into WORK, basic cleansing */
proc sql;
    create table work.customers as
    select
        cust_id                  as customer_id,
        %clean_text(first_name)  as first_name,
        %clean_text(last_name)   as last_name,
        upcase(country)          as country_code,
        signup_date,
        status
    from raw.cust_master
    where signup_date >= '01JAN2020'd;
quit;

/* Step 2 — update WORK.CUSTOMERS in place: add risk flag */
data work.customers;
    set work.customers;
    length risk_flag $10;
    if      status = 'A' and signup_date < today() - 365 then risk_flag = 'TENURED';
    else if status = 'A'                                  then risk_flag = 'NEW';
    else                                                       risk_flag = 'INACTIVE';
run;

/* Step 3 — update WORK.CUSTOMERS in place: add segment */
data work.customers;
    set work.customers;
    length segment $20;
    if      risk_flag = 'TENURED' and country_code = 'US' then segment = 'PREMIUM_US';
    else if risk_flag = 'TENURED'                          then segment = 'PREMIUM_INTL';
    else if risk_flag = 'NEW'                              then segment = 'NEW_ACTIVE';
    else                                                        segment = 'INACTIVE';
run;

/* Step 4 — finalize to staging library */
proc sql;
    create table stg.customers as
    select
        customer_id,
        first_name,
        last_name,
        country_code,
        signup_date,
        risk_flag,
        segment,
        case when status = 'A' then 1 else 0 end as is_active
    from work.customers;
quit;
`,qP=`/*------------------------------------------------------------------
 * orders_transform.sas
 * Clean raw orders, then enrich by joining the finalized stg.customers
 *-----------------------------------------------------------------*/

libname raw  oracle user=&ora_user. password=&ora_pwd.
             path=ord_prod schema=ORDERS;
libname stg  "/data/staging";
libname mart "/data/mart";

/* Step 5 */
proc sql;
    create table stg.orders_clean as
    select
        o.order_id,
        o.cust_id        as customer_id,
        o.order_dt       as order_date,
        o.gross_amt      as gross_amount,
        o.discount_amt   as discount_amount,
        (o.gross_amt - o.discount_amt) as net_amount,
        o.currency_cd    as currency_code
    from raw.orders o
    where o.order_status not in ('CANCELLED', 'REJECTED');
quit;

/* Step 6 — single join now that stg.customers carries risk_flag and segment */
proc sql;
    create table mart.orders_enriched as
    select
        o.*,
        c.country_code,
        c.risk_flag,
        c.segment        as customer_segment
    from stg.orders_clean o
    left join stg.customers c
        on o.customer_id = c.customer_id;
quit;
`,zP=`/*------------------------------------------------------------------
 * sales_summary.sas
 * Roll up enriched orders into monthly summary by segment and country
 *-----------------------------------------------------------------*/

libname mart "/data/mart";

proc sql;
    create table mart.sales_monthly as
    select
        put(order_date, yymmn6.) as month_id,
        country_code,
        customer_segment,
        count(distinct customer_id) as customers,
        count(*)                   as order_count,
        sum(net_amount)            as net_revenue,
        sum(gross_amount)          as gross_revenue,
        sum(discount_amount)       as total_discount
    from mart.orders_enriched
    group by 1, 2, 3;
quit;

proc sql;
    create table mart.top_segments as
    select
        month_id,
        customer_segment,
        sum(net_revenue) as segment_revenue
    from mart.sales_monthly
    group by month_id, customer_segment
    having segment_revenue > 100000
    order by month_id, segment_revenue desc;
quit;
